name: Daily Hot Water News Update

# 设置定时触发：每天北京时间上午 10:00 (UTC 2:00)
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Fetch Script
      run: |
        # 这里运行一个简化的爬虫脚本，抓取结果并写入 REPORT.md
        python .github/scripts/fetch_news.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "HotWater-Bot"
        git config --global user.email "bot@hotwater.global"
        git add REPORT.md
        git commit -m "Update: Daily Hot Water News [$(date +'%Y-%m-%d')]" || exit 0
        git push
